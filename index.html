<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winslow Brown AI - Project Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .auth-container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
        }
        
        .auth-container h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .auth-container p {
            color: #888;
            margin-bottom: 30px;
        }
        
        .auth-form input {
            width: 100%;
            padding: 12px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        
        .auth-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .auth-form button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .auth-form button:hover {
            opacity: 0.9;
        }
        
        .error {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }
        
        .dashboard {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            width: 100%;
        }
        
        .dashboard.active {
            display: block;
        }
        
        header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logout-btn {
            padding: 8px 16px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .logout-btn:hover {
            border-color: #667eea;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }
        
        .project-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .project-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.15);
        }
        
        .project-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .project-desc {
            color: #aaa;
            font-size: 0.95rem;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        
        .project-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-live { background: #10b981; color: #000; }
        .status-building { background: #f59e0b; color: #000; }
        .status-planned { background: #6366f1; color: #fff; }
    </style>
</head>
<body>
    <div class="auth-container" id="authContainer">
        <h1>Winslow Brown AI</h1>
        <p>Private Project Hub</p>
        <form class="auth-form" id="authForm">
            <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off" required>
            <button type="submit">Access Hub</button>
            <div class="error" id="errorMsg">Incorrect password</div>
        </form>
    </div>
    
    <div class="dashboard" id="dashboard">
        <header>
            <h1>Project Hub</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </header>
        
        <div class="projects-grid" id="projectsGrid">
            <!-- Projects loaded here -->
        </div>
    </div>
    
    <script>
        // Simple password protection (client-side)
        // For production, use Vercel Edge Middleware or proper auth
        const PASSWORD_HASH = 'winslow2026'; // Change this to your actual password
        
        const projects = [
            {
                title: "Ideas Repository",
                description: "Comprehensive project ideas dashboard with effort/revenue tracking and active project monitoring",
                url: "https://projects.winslowbrown.ai/",
                status: "live"
            },
            {
                title: "Rose - Chief of Staff",
                description: "AI agent coordinating home and work life. Manages Gmail, calendars, communicates via Telegram.",
                url: "/rose",
                status: "building"
            },
            {
                title: "Freedom Audit",
                description: "Comprehensive life assessment tool with AI-generated reports",
                url: "https://freedom-audit-ten.vercel.app/",
                status: "live"
            },
            {
                title: "X Content Dashboard",
                description: "Content queue management for X/Twitter",
                url: "#",
                status: "live"
            }
        ];
        
        // Auth handling
        document.getElementById('authForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('passwordInput').value;
            
            if (password === PASSWORD_HASH) {
                sessionStorage.setItem('authenticated', 'true');
                showDashboard();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
        
        function showDashboard() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            renderProjects();
        }
        
        function logout() {
            sessionStorage.removeItem('authenticated');
            location.reload();
        }
        
        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = projects.map(project => `
                <a href="${project.url}" class="project-card" ${project.url.startsWith('http') ? 'target="_blank"' : ''}>
                    <div class="project-title">${project.title}</div>
                    <div class="project-desc">${project.description}</div>
                    <div class="project-meta">
                        <span class="status-badge status-${project.status}">${project.status}</span>
                    </div>
                </a>
            `).join('');
        }
        
        // Check if already authenticated
        if (sessionStorage.getItem('authenticated') === 'true') {
            showDashboard();
        }
    </script>
</body>
</html>
